<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TerraLab Studio</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1f2b24 0%, #0d0f11 45%, #08090a 100%);
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      padding: 40px;
    }

    img {
      width: 260px;
      max-width: 80%;
      margin-bottom: 32px;
    }

    h1 {
      margin: 0;
      font-size: 48px;
      letter-spacing: 4px;
      color: #9dff45;
    }

    h2 {
      margin-top: 14px;
      font-size: 24px;
      font-weight: 400;
      color: #ffffff;
    }

    p {
      margin-top: 24px;
      font-size: 18px;
      color: #b8b8b8;
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="logo.png" alt="TerraLab Studio Logo" />
    <h1>COMING SOON</h1>
    <h2>TerraLab Studio</h2>
    <p>Professional terrain production software.</p>
  </div>
</body>
</html>
