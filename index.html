<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TerraLab Studio</title>

<!-- Favicons -->
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 30% 10%, rgba(139, 255, 52, 0.18), transparent 32%),
        radial-gradient(circle at 80% 80%, rgba(139, 255, 52, 0.08), transparent 35%),
        #07090a;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .contours {
      position: fixed;
      inset: 0;
      opacity: 0.17;
      background-image:
        repeating-radial-gradient(
          ellipse at center,
          transparent 0px,
          transparent 18px,
          rgba(150, 255, 65, 0.35) 19px,
          transparent 21px
        );
      transform: rotate(-12deg) scale(1.55);
      animation: terrainDrift 28s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes terrainDrift {
      from {
        transform: rotate(-12deg) scale(1.55) translateX(0px) translateY(0px);
      }
      to {
        transform: rotate(-12deg) scale(1.65) translateX(-70px) translateY(35px);
      }
    }

    .page {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
    }

    .card {
      max-width: 860px;
      width: 100%;
      padding: 52px 40px;
      border: 1px solid rgba(157, 255, 69, 0.28);
      border-radius: 24px;
      background: rgba(10, 14, 13, 0.76);
      box-shadow:
        0 0 80px rgba(157, 255, 69, 0.12),
        inset 0 0 40px rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(14px);
      transition: 0.35s ease;
      animation: fadeCard 1s ease forwards;
    }

    .card:hover {
      border-color: rgba(157, 255, 69, 0.5);
      box-shadow:
        0 0 110px rgba(157, 255, 69, 0.22),
        inset 0 0 44px rgba(255, 255, 255, 0.04);
      transform: translateY(-3px);
    }

    @keyframes fadeCard {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      width: 285px;
      max-width: 80%;
      margin-bottom: 34px;
      filter: drop-shadow(0 0 26px rgba(157, 255, 69, 0.22));
      animation: logoFade 1.1s ease forwards;
    }

    @keyframes logoFade {
      from {
        opacity: 0;
        transform: scale(0.96);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .eyebrow {
      color: #9dff45;
      letter-spacing: 4px;
      font-size: 13px;
      text-transform: uppercase;
      margin-bottom: 18px;
      animation: fadeUp 1s ease 0.25s both;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 7vw, 82px);
      line-height: 0.95;
      letter-spacing: -2px;
      text-transform: uppercase;
    }

    .line-one {
      display: block;
      animation: fadeUp 0.9s ease 0.45s both;
    }

    .line-two {
      display: block;
      color: #9dff45;
      animation: glowUp 0.9s ease 0.95s both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes glowUp {
      from {
        opacity: 0;
        transform: translateY(24px);
        text-shadow: 0 0 0 rgba(157, 255, 69, 0);
      }
      to {
        opacity: 1;
        transform: translateY(0);
        text-shadow: 0 0 28px rgba(157, 255, 69, 0.32);
      }
    }

    p {
      max-width: 660px;
      margin: 28px auto 0;
      color: #c4c8c3;
      font-size: 19px;
      line-height: 1.7;
      animation: fadeUp 1s ease 1.35s both;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 36px;
      padding: 13px 20px;
      border: 1px solid rgba(157, 255, 69, 0.35);
      border-radius: 999px;
      color: #ffffff;
      background: rgba(157, 255, 69, 0.08);
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 13px;
      animation: fadeUp 1s ease 1.65s both;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #9dff45;
      box-shadow: 0 0 18px #9dff45;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.75); }
    }

    .footer {
      margin-top: 38px;
      color: #777f78;
      font-size: 14px;
      animation: fadeUp 1s ease 1.85s both;
    }

    @media (max-width: 600px) {
      .card {
        padding: 42px 24px;
      }

      p {
        font-size: 16px;
      }

      .logo {
        width: 240px;
      }
    }
  </style>
</head>

<body>
  <div class="contours"></div>

  <main class="page">
    <section class="card">
      <img class="logo" src="logo-transparent.png" alt="TerraLab Studio Logo" />

      <div class="eyebrow">Professional Terrain Production Software</div>

      <h1>
        <span class="line-one">Create Terrain.</span>
        <span class="line-two">Not Workflow.</span>
      </h1>

      <p>
        TerraLab Studio is a terrain production suite built to bring terrain editing,
        texture painting, materials, and live 2D/3D workflows into one focused application.
      </p>

      <div class="status">
        <span class="dot"></span>
        Currently in Active Development
      </div>

      <div class="footer">
        terralabstudio.com
      </div>
    </section>
  </main>
</body>
</html>
</html>
