<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TerraLab Studio</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 30% 10%, rgba(139, 255, 52, 0.18), transparent 32%),
        radial-gradient(circle at 80% 80%, rgba(139, 255, 52, 0.08), transparent 35%),
        #07090a;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .contours {
      position: fixed;
      inset: 0;
      opacity: 0.16;
      background-image:
        repeating-radial-gradient(
          ellipse at center,
          transparent 0px,
          transparent 18px,
          rgba(150, 255, 65, 0.35) 19px,
          transparent 21px
        );
      transform: rotate(-12deg) scale(1.5);
      animation: drift 18s linear infinite;
      pointer-events: none;
    }

    @keyframes drift {
      from { transform: rotate(-12deg) scale(1.5) translateX(0); }
      to { transform: rotate(-12deg) scale(1.5) translateX(-80px); }
    }

    .page {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
    }

    .card {
      max-width: 860px;
      width: 100%;
      padding: 56px 40px;
      border: 1px solid rgba(157, 255, 69, 0.28);
      border-radius: 24px;
      background: rgba(10, 14, 13, 0.76);
      box-shadow:
        0 0 80px rgba(157, 255, 69, 0.12),
        inset 0 0 40px rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(14px);
    }

    .logo {
      width: 330px;
      max-width: 85%;
      margin-bottom: 34px;
      filter: drop-shadow(0 0 24px rgba(157, 255, 69, 0.18));
    }

    .eyebrow {
      color: #9dff45;
      letter-spacing: 4px;
      font-size: 13px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 7vw, 82px);
      line-height: 0.95;
      letter-spacing: -2px;
      text-transform: uppercase;
    }

    h1 span {
      color: #9dff45;
    }

    p {
      max-width: 660px;
      margin: 28px auto 0;
      color: #c4c8c3;
      font-size: 19px;
      line-height: 1.7;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 36px;
      padding: 13px 20px;
      border: 1px solid rgba(157, 255, 69, 0.35);
      border-radius: 999px;
      color: #ffffff;
      background: rgba(157, 255, 69, 0.08);
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 13px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #9dff45;
      box-shadow: 0 0 18px #9dff45;
    }

    .footer {
      margin-top: 38px;
      color: #777f78;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .card {
        padding: 42px 24px;
      }

      p {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="contours"></div>

  <main class="page">
    <section class="card">
      <img class="logo" src="logo.png" alt="TerraLab Studio Logo" />

      <div class="eyebrow">Professional Terrain Production Software</div>

      <h1>Create Terrain.<br><span>Not Workflow.</span></h1>

      <p>
        TerraLab Studio is a terrain production suite built to bring terrain editing,
        texture painting, materials, and live 2D/3D workflows into one focused application.
      </p>

      <div class="status">
        <span class="dot"></span>
        Currently in Active Development
      </div>

      <div class="footer">
        terralabstudio.com
      </div>
    </section>
  </main>
</body>
</html>
